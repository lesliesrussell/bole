# bole-jio — cargo-audit configuration.
#
# Each ignore below is a conscious, documented acceptance, not a blanket mute.
# Re-review whenever `gix` is bumped; drop an entry as soon as a fix is reachable.
[advisories]
ignore = [
    # RUSTSEC-2025-0140 — gix-date: a non-UTF-8 String can be created via
    # `TimeBuf::as_str`. Transitive via gix (git import/export only). bole never
    # calls the vulnerable API: it reads git commit/tag time via SignatureRef
    # `.seconds()` (numeric), never `TimeBuf::as_str`. No published gix release
    # yet depends on the fixed gix-date >= 0.12.0, so it cannot be resolved by a
    # gix bump today. Not on any bole code path.
    "RUSTSEC-2025-0140",

    # RUSTSEC-2023-0089 — atomic-polyfill unmaintained (warning, not a vuln).
    # Deep transitive dependency; no direct use by bole.
    "RUSTSEC-2023-0089",

    # RUSTSEC-2026-0173 — proc-macro-error2 unmaintained (warning, not a vuln).
    # Build-time transitive (proc-macro) dependency; not shipped at runtime.
    "RUSTSEC-2026-0173",
]
